<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg6)"/>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <filter id="glow6"><feGaussianBlur stdDeviation="4"/></filter>
    <marker id="a6" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6366f1"/>
    </marker>
    <marker id="a6c" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Pattern 1: ReAct (top-left) -->
  <rect x="20" y="20" width="230" height="165" rx="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="35" y="42" font-family="monospace" font-size="10" fill="#a5b4fc" font-weight="bold">① ReAct</text>
  <text x="35" y="57" font-family="monospace" font-size="8" fill="#6366f1">思考 → 行動 → 観察</text>
  <rect x="35" y="68" width="60" height="22" rx="6" fill="#312e81"/>
  <text x="65" y="83" text-anchor="middle" font-family="monospace" font-size="8" fill="#c7d2fe">Thought</text>
  <rect x="115" y="68" width="60" height="22" rx="6" fill="#312e81"/>
  <text x="145" y="83" text-anchor="middle" font-family="monospace" font-size="8" fill="#c7d2fe">Action</text>
  <path d="M95,79 L115,79" stroke="#6366f1" stroke-width="1" marker-end="url(#a6)"/>
  <rect x="75" y="108" width="70" height="22" rx="6" fill="#312e81"/>
  <text x="110" y="123" text-anchor="middle" font-family="monospace" font-size="8" fill="#c7d2fe">Observe</text>
  <path d="M175,90 C200,90 200,119 165,119" stroke="#6366f1" stroke-width="1" fill="none" marker-end="url(#a6)"/>
  <path d="M75,119 C50,119 50,79 35,79" stroke="#6366f1" stroke-width="1" fill="none" marker-end="url(#a6)"/>
  <text x="35" y="150" font-family="monospace" font-size="8" fill="#818cf8">→ 汎用エージェントの基本パターン</text>
  <text x="35" y="165" font-family="monospace" font-size="8" fill="#818cf8">→ 最もシンプルで安定</text>

  <!-- Pattern 2: Plan-and-Execute (top-middle) -->
  <rect x="285" y="20" width="230" height="165" rx="12" fill="#0c1a2e" stroke="#22d3ee" stroke-width="1"/>
  <text x="300" y="42" font-family="monospace" font-size="10" fill="#67e8f9" font-weight="bold">② Plan-and-Execute</text>
  <text x="300" y="57" font-family="monospace" font-size="8" fill="#06b6d4">計画 → 順次実行</text>
  <rect x="300" y="68" width="195" height="22" rx="6" fill="#0f2035"/>
  <text x="397" y="83" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">Planner: 全体計画を生成</text>
  <rect x="300" y="98" width="90" height="22" rx="6" fill="#132137"/>
  <text x="345" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="#22d3ee">Step 1</text>
  <rect x="405" y="98" width="90" height="22" rx="6" fill="#132137"/>
  <text x="450" y="113" text-anchor="middle" font-family="monospace" font-size="8" fill="#22d3ee">Step 2</text>
  <rect x="300" y="128" width="195" height="22" rx="6" fill="#0f2035"/>
  <text x="397" y="143" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">Executor: ステップを実行</text>
  <path d="M397,90 L397,98" stroke="#22d3ee" stroke-width="1" marker-end="url(#a6c)"/>
  <path d="M397,120 L397,128" stroke="#22d3ee" stroke-width="1" marker-end="url(#a6c)"/>
  <text x="300" y="168" font-family="monospace" font-size="8" fill="#67e8f9" opacity="0.7">→ 長期タスク向き · 全体最適化</text>

  <!-- Pattern 3: Multi-Agent (top-right) -->
  <rect x="550" y="20" width="230" height="165" rx="12" fill="#1a0a2e" stroke="#a855f7" stroke-width="1"/>
  <text x="565" y="42" font-family="monospace" font-size="10" fill="#d8b4fe" font-weight="bold">③ Multi-Agent</text>
  <text x="565" y="57" font-family="monospace" font-size="8" fill="#a855f7">専門化 → 並列処理</text>
  <rect x="620" y="65" width="80" height="20" rx="6" fill="#2d1d4b"/>
  <text x="660" y="79" text-anchor="middle" font-family="monospace" font-size="8" fill="#d8b4fe">Orchestrator</text>
  <rect x="565" y="100" width="60" height="20" rx="6" fill="#1a1030"/>
  <text x="595" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#c084fc">Worker A</text>
  <rect x="640" y="100" width="60" height="20" rx="6" fill="#1a1030"/>
  <text x="670" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#c084fc">Worker B</text>
  <path d="M645,85 L595,100" stroke="#a855f7" stroke-width="1" marker-end="url(#a6)"/>
  <path d="M672,85 L668,100" stroke="#a855f7" stroke-width="1" marker-end="url(#a6)"/>
  <path d="M595,120 C595,140 640,140 645,125" stroke="#a855f7" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <text x="565" y="150" font-family="monospace" font-size="8" fill="#d8b4fe" opacity="0.8">→ 複雑タスクの並列処理</text>
  <text x="565" y="165" font-family="monospace" font-size="8" fill="#d8b4fe" opacity="0.8">→ このプロジェクトが採用</text>

  <!-- Pattern 4: Tool Use (bottom-left) -->
  <rect x="20" y="215" width="230" height="165" rx="12" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1"/>
  <text x="35" y="237" font-family="monospace" font-size="10" fill="#fcd34d" font-weight="bold">④ Tool Use</text>
  <text x="35" y="252" font-family="monospace" font-size="8" fill="#f59e0b">外部ツール呼び出し</text>
  <rect x="35" y="262" width="80" height="20" rx="6" fill="#292012"/>
  <text x="75" y="276" text-anchor="middle" font-family="monospace" font-size="8" fill="#fcd34d">LLM</text>
  <rect x="150" y="253" width="80" height="20" rx="6" fill="#292012"/>
  <text x="190" y="267" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">Web Search</text>
  <rect x="150" y="280" width="80" height="20" rx="6" fill="#292012"/>
  <text x="190" y="294" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">Code Exec</text>
  <rect x="150" y="307" width="80" height="20" rx="6" fill="#292012"/>
  <text x="190" y="321" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">DB Query</text>
  <path d="M115,272 L150,263" stroke="#f59e0b" stroke-width="1" marker-end="url(#a6)"/>
  <path d="M115,272 L150,289" stroke="#f59e0b" stroke-width="1" marker-end="url(#a6)"/>
  <path d="M115,272 L150,316" stroke="#f59e0b" stroke-width="1" marker-end="url(#a6)"/>
  <text x="35" y="352" font-family="monospace" font-size="8" fill="#fcd34d" opacity="0.7">→ Claude function calling</text>
  <text x="35" y="367" font-family="monospace" font-size="8" fill="#fcd34d" opacity="0.7">→ MCPプロトコル対応</text>

  <!-- Pattern 5: Reflection (bottom-middle) -->
  <rect x="285" y="215" width="230" height="165" rx="12" fill="#0c1a2e" stroke="#10b981" stroke-width="1"/>
  <text x="300" y="237" font-family="monospace" font-size="10" fill="#6ee7b7" font-weight="bold">⑤ Reflection</text>
  <text x="300" y="252" font-family="monospace" font-size="8" fill="#10b981">生成 → 自己評価 → 改善</text>
  <rect x="355" y="262" width="80" height="22" rx="6" fill="#0a2d1a"/>
  <text x="395" y="277" text-anchor="middle" font-family="monospace" font-size="8" fill="#6ee7b7">Generate</text>
  <rect x="355" y="295" width="80" height="22" rx="6" fill="#0a2d1a"/>
  <text x="395" y="310" text-anchor="middle" font-family="monospace" font-size="8" fill="#6ee7b7">Evaluate</text>
  <path d="M395,284 L395,295" stroke="#10b981" stroke-width="1" marker-end="url(#a6)"/>
  <!-- Loop back if fail -->
  <path d="M355,306 C320,306 320,272 355,272" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#a6)"/>
  <text x="305" y="292" font-family="monospace" font-size="8" fill="#10b981">retry</text>
  <!-- Pass arrow -->
  <path d="M435,306 L475,306" stroke="#10b981" stroke-width="1" marker-end="url(#a6)"/>
  <text x="460" y="318" font-family="monospace" font-size="8" fill="#10b981">✓ pass</text>
  <text x="300" y="352" font-family="monospace" font-size="8" fill="#6ee7b7" opacity="0.7">→ コンテンツ品質担保</text>
  <text x="300" y="367" font-family="monospace" font-size="8" fill="#6ee7b7" opacity="0.7">→ 幻覚検出に有効</text>

  <!-- Right bottom: summary -->
  <rect x="550" y="215" width="230" height="165" rx="12" fill="#111" stroke="#374151" stroke-width="1"/>
  <text x="565" y="237" font-family="monospace" font-size="10" fill="#9ca3af" font-weight="bold">判断基準</text>
  <text x="565" y="258" font-family="monospace" font-size="8" fill="#6b7280">タスクが短期 → ReAct</text>
  <text x="565" y="276" font-family="monospace" font-size="8" fill="#6b7280">タスクが長期 → Plan-Execute</text>
  <text x="565" y="294" font-family="monospace" font-size="8" fill="#6b7280">品質担保が必要 → Reflection</text>
  <text x="565" y="312" font-family="monospace" font-size="8" fill="#6b7280">外部情報が必要 → Tool Use</text>
  <text x="565" y="330" font-family="monospace" font-size="8" fill="#6b7280">専門化が必要 → Multi-Agent</text>
  <rect x="565" y="345" width="200" height="25" rx="6" fill="#1e1b4b"/>
  <text x="665" y="362" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">組み合わせが最も強力</text>

  <text x="400" y="394" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1" opacity="0.3">AI Agent Design Patterns 2026 · AgenticWorkerz</text>
</svg>
