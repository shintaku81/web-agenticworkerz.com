<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg5)"/>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a20"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="glow5"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <!-- Background glows -->
  <circle cx="200" cy="200" r="120" fill="#7c3aed" opacity="0.07" filter="url(#glow5)"/>
  <circle cx="600" cy="200" r="120" fill="#06b6d4" opacity="0.07" filter="url(#glow5)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="monospace" font-size="13" fill="#c4b5fd" font-weight="bold">AIエージェントのキャラクタープロファイル</text>

  <!-- Agent cards (3 across) -->
  <!-- AIRA card -->
  <rect x="40" y="60" width="220" height="280" rx="14" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="150" cy="100" r="26" fill="#312e81" stroke="#7c3aed" stroke-width="2"/>
  <text x="150" y="97" text-anchor="middle" font-family="monospace" font-size="14" fill="#c4b5fd" font-weight="bold">A</text>
  <text x="150" y="111" text-anchor="middle" font-family="monospace" font-size="8" fill="#7c3aed">Aira</text>
  <text x="150" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd" font-weight="bold">Aira</text>
  <text x="150" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">オーケストレーター</text>
  <!-- YAML snippet -->
  <rect x="58" y="172" width="184" height="140" rx="8" fill="#0d0b20"/>
  <text x="70" y="192" font-family="monospace" font-size="8" fill="#6366f1">personality:</text>
  <text x="80" y="206" font-family="monospace" font-size="8" fill="#a5b4fc">tone: calm_assertive</text>
  <text x="80" y="220" font-family="monospace" font-size="8" fill="#a5b4fc">style: logical</text>
  <text x="70" y="236" font-family="monospace" font-size="8" fill="#6366f1">traits:</text>
  <text x="80" y="250" font-family="monospace" font-size="8" fill="#818cf8">- 統率力</text>
  <text x="80" y="264" font-family="monospace" font-size="8" fill="#818cf8">- 公平な判断</text>
  <text x="80" y="278" font-family="monospace" font-size="8" fill="#818cf8">- 全体最適化</text>
  <text x="70" y="296" font-family="monospace" font-size="8" fill="#6366f1">language: ja</text>

  <!-- KIKI card -->
  <rect x="290" y="60" width="220" height="280" rx="14" fill="#0c1a2e" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="400" cy="100" r="26" fill="#0f2035" stroke="#06b6d4" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" font-family="monospace" font-size="14" fill="#67e8f9" font-weight="bold">K</text>
  <text x="400" y="111" text-anchor="middle" font-family="monospace" font-size="8" fill="#06b6d4">KIKI</text>
  <text x="400" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#67e8f9" font-weight="bold">KIKI</text>
  <text x="400" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#06b6d4">モニター・見張り番</text>
  <rect x="308" y="172" width="184" height="140" rx="8" fill="#060e1a"/>
  <text x="320" y="192" font-family="monospace" font-size="8" fill="#0891b2">personality:</text>
  <text x="330" y="206" font-family="monospace" font-size="8" fill="#22d3ee">tone: watchful</text>
  <text x="330" y="220" font-family="monospace" font-size="8" fill="#22d3ee">style: precise</text>
  <text x="320" y="236" font-family="monospace" font-size="8" fill="#0891b2">traits:</text>
  <text x="330" y="250" font-family="monospace" font-size="8" fill="#67e8f9">- 細心の注意</text>
  <text x="330" y="264" font-family="monospace" font-size="8" fill="#67e8f9">- 即時アラート</text>
  <text x="330" y="278" font-family="monospace" font-size="8" fill="#67e8f9">- 不屈の監視</text>
  <text x="320" y="296" font-family="monospace" font-size="8" fill="#0891b2">alerts: true</text>

  <!-- NIKO card -->
  <rect x="540" y="60" width="220" height="280" rx="14" fill="#1a1030" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="650" cy="100" r="26" fill="#2d1d4b" stroke="#a855f7" stroke-width="2"/>
  <text x="650" y="97" text-anchor="middle" font-family="monospace" font-size="14" fill="#d8b4fe" font-weight="bold">N</text>
  <text x="650" y="111" text-anchor="middle" font-family="monospace" font-size="8" fill="#a855f7">Niko</text>
  <text x="650" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#d8b4fe" font-weight="bold">Niko</text>
  <text x="650" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">ジェネレーター</text>
  <rect x="558" y="172" width="184" height="140" rx="8" fill="#10081e"/>
  <text x="570" y="192" font-family="monospace" font-size="8" fill="#7e22ce">personality:</text>
  <text x="580" y="206" font-family="monospace" font-size="8" fill="#c084fc">tone: creative</text>
  <text x="580" y="220" font-family="monospace" font-size="8" fill="#c084fc">style: expressive</text>
  <text x="570" y="236" font-family="monospace" font-size="8" fill="#7e22ce">traits:</text>
  <text x="580" y="250" font-family="monospace" font-size="8" fill="#d8b4fe">- 豊かな表現力</text>
  <text x="580" y="264" font-family="monospace" font-size="8" fill="#d8b4fe">- ストリーミング</text>
  <text x="580" y="278" font-family="monospace" font-size="8" fill="#d8b4fe">- ユーザー共感</text>
  <text x="570" y="296" font-family="monospace" font-size="8" fill="#7e22ce">stream: true</text>

  <text x="400" y="388" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1" opacity="0.4">YAML Character Profiles · AWZ-natural-dialogue project</text>
</svg>
