<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Glow circles -->
  <circle cx="400" cy="200" r="160" fill="url(#glow1)" filter="url(#blur)"/>

  <!-- Connection lines -->
  <g stroke="#6366f1" stroke-opacity="0.25" stroke-width="1">
    <line x1="400" y1="200" x2="220" y2="110"/>
    <line x1="400" y1="200" x2="580" y2="110"/>
    <line x1="400" y1="200" x2="180" y2="200"/>
    <line x1="400" y1="200" x2="620" y2="200"/>
    <line x1="400" y1="200" x2="220" y2="290"/>
    <line x1="400" y1="200" x2="580" y2="290"/>
    <line x1="400" y1="200" x2="340" y2="80"/>
    <line x1="400" y1="200" x2="460" y2="80"/>
    <line x1="220" y1="110" x2="180" y2="200"/>
    <line x1="580" y1="110" x2="620" y2="200"/>
    <line x1="220" y1="290" x2="180" y2="200"/>
    <line x1="580" y1="290" x2="620" y2="200"/>
    <line x1="340" y1="80" x2="220" y2="110"/>
    <line x1="460" y1="80" x2="580" y2="110"/>
  </g>

  <!-- Moving data particles -->
  <circle r="2.5" fill="#22d3ee" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M400,200 L220,110"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#6366f1" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M400,200 L620,200"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#22d3ee" opacity="0.8">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M220,110 L400,200 L580,290"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Center node: Aira -->
  <circle cx="400" cy="200" r="28" fill="#1e1b4b" stroke="#6366f1" stroke-width="2.5"/>
  <circle cx="400" cy="200" r="22" fill="#312e81"/>
  <text x="400" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">AIRA</text>
  <text x="400" y="208" text-anchor="middle" font-family="monospace" font-size="8" fill="#818cf8">orch</text>

  <!-- Worker nodes -->
  <g>
    <!-- KIKI -->
    <circle cx="220" cy="110" r="20" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="220" y="107" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">KIKI</text>
    <text x="220" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">monitor</text>
  </g>
  <g>
    <!-- RIKU -->
    <circle cx="580" cy="110" r="20" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="580" y="107" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">RIKU</text>
    <text x="580" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#818cf8">ingest</text>
  </g>
  <g>
    <!-- SEN -->
    <circle cx="180" cy="200" r="20" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="180" y="197" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">SEN</text>
    <text x="180" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#818cf8">router</text>
  </g>
  <g>
    <!-- SORA -->
    <circle cx="620" cy="200" r="20" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="620" y="197" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">SORA</text>
    <text x="620" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">search</text>
  </g>
  <g>
    <!-- HARU -->
    <circle cx="220" cy="290" r="20" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="220" y="287" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">HARU</text>
    <text x="220" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="#818cf8">rerank</text>
  </g>
  <g>
    <!-- NIKO -->
    <circle cx="580" cy="290" r="20" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="580" y="287" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">NIKO</text>
    <text x="580" y="298" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">generate</text>
  </g>
  <g>
    <!-- TOMO -->
    <circle cx="340" cy="80" r="20" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="340" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">TOMO</text>
    <text x="340" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#818cf8">validate</text>
  </g>
  <g>
    <!-- LUNA -->
    <circle cx="460" cy="80" r="20" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="460" y="77" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">LUNA</text>
    <text x="460" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">graph</text>
  </g>
  <!-- 9th node bottom center -->
  <g>
    <circle cx="400" cy="330" r="20" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="400" y="327" text-anchor="middle" font-family="monospace" font-size="7" fill="#a5b4fc">DASH</text>
    <text x="400" y="338" text-anchor="middle" font-family="monospace" font-size="7" fill="#818cf8">:8080</text>
    <line x1="400" y1="200" x2="400" y2="310" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  </g>

  <!-- Label -->
  <text x="400" y="375" text-anchor="middle" font-family="monospace" font-size="11" fill="#6366f1" opacity="0.6">9-Agent Team Architecture · Local PC</text>
</svg>
